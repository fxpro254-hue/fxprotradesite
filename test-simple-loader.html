<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Loader Test</title>
    <style>
        /* Simple Loader Styles */
        .simple-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .simple-loader__content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            text-align: center;
        }

        .simple-loader__spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e5e7eb;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .simple-loader__message {
            color: #ffffff;
            font-size: 1.125rem;
            font-weight: 500;
            margin: 0;
        }

        .simple-loader__sub-message {
            color: #9ca3af;
            font-size: 0.875rem;
            margin: 0;
            opacity: 0.8;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 0.8;
            }
            50% {
                transform: scale(1.05);
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="simple-loader">
        <div class="simple-loader__content">
            <div class="simple-loader__spinner"></div>
            <div class="simple-loader__message">Loading...</div>
            <div class="simple-loader__sub-message">Please wait</div>
        </div>
    </div>

    <script>
        // Auto hide loader after 3 seconds for demo
        setTimeout(() => {
            document.querySelector('.simple-loader').style.display = 'none';
            document.body.innerHTML = '<h1 style="text-align: center; margin-top: 2rem; font-family: sans-serif;">Content Loaded!</h1>';
        }, 3000);
    </script>
</body>
</html>
