<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Deriv Tick Data</title>
        <style>
            :root {
                /* Gold colors (consistent across themes) */
                --gold-primary: #FFD700;
                --gold-secondary: #FFA500;
                --gold-dark: #B8860B;
                --gold-light: #F4E4BC;
                --gold-gradient: linear-gradient(135deg, #e0ce57 0%, #e0ce57 50%, #e0ce57 100%);
                
                /* Default Dark Theme */
                --bg-primary: #0f0f1a;
                --bg-secondary: #1a1a2e;
                --bg-card: rgba(26, 26, 46, 0.9);
                --text-primary: #ffffff;
                --text-secondary: #F4E4BC;
                --text-muted: #888888;
                --border-color: rgba(255, 215, 0, 0.3);
                --shadow-color: rgba(0, 0, 0, 0.3);
                --table-hover: rgba(255, 215, 0, 0.05);
                --neutral-bg: rgba(255, 255, 255, 0.1);
                --header-text: #1a1a1a;
            }

            /* Light Theme */
            [data-theme="light"] {
                --bg-primary: #f5f5f5;
                --bg-secondary: #ffffff;
                --bg-card: rgba(255, 255, 255, 0.95);
                --text-primary: #1a1a1a;
                --text-secondary: #333333;
                --text-muted: #666666;
                --border-color: rgba(184, 134, 11, 0.3);
                --shadow-color: rgba(0, 0, 0, 0.1);
                --table-hover: rgba(255, 215, 0, 0.1);
                --neutral-bg: rgba(0, 0, 0, 0.05);
                --header-text: #1a1a1a;
            }

            * {
                transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
            }

            body {
                font-family: 'Poppins', sans-serif;
                background: var(--bg-primary);
                text-align: center;
                margin: 0;
                padding: 10px;
                padding-bottom: 30px;
                min-height: 100vh;
                color: var(--text-primary);
            }

            /* Theme Toggle Button */
            .theme-toggle {
                position: fixed;
                top: 20px;
                right: 20px;
                width: 50px;
                height: 50px;
                border-radius: 50%;
                border: 2px solid var(--gold-primary);
                background: var(--bg-card);
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 24px;
                box-shadow: 0 4px 15px var(--shadow-color);
                z-index: 1000;
                transition: all 0.3s ease;
            }

            .theme-toggle:hover {
                transform: scale(1.1);
                box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            }

            h2 {
                color: var(--gold-primary);
                margin-bottom: 15px;
                font-size: 24px;
                text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
                font-weight: 700;
            }

            table {
                width: 90%;
                max-width: 800px;
                margin: 12px auto;
                border-collapse: collapse;
                background: var(--bg-card);
                box-shadow: 
                    0 5px 15px var(--shadow-color),
                    0 0 0 1px var(--border-color);
                border-radius: 10px;
                overflow: hidden;
                border: 1px solid var(--border-color);
            }

            th,
            td {
                border: 1px solid var(--border-color);
                padding: 8px;
                text-align: center;
                font-size: 14px;
                color: var(--text-primary);
            }

            th {
                background: var(--gold-gradient);
                color: var(--header-text);
                text-transform: uppercase;
                letter-spacing: 1px;
                font-weight: 700;
            }

            .signal-box {
                padding-right: 3px;
                padding-left: 3px;
                font-weight: 600;
                border-radius: 4px;
                display: inline-block;
                width: 65px;
                text-transform: initial;
                font-size: 14px;
            }

            /* Enhanced signal boxes */
            .rise {
                background: var(--gold-gradient);
                color: #1a1a1a;
                font-weight: 700;
                box-shadow: 0 2px 8px rgba(255, 215, 0, 0.4);
            }

            .fall {
                background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
                color: white;
                font-weight: 700;
                box-shadow: 0 2px 8px rgba(238, 90, 111, 0.3);
            }

            .over,
            .under {
                background: linear-gradient(135deg, #e0ce57 0%, #e0ce57 100%);
                color: white;
                font-weight: 700;
                box-shadow: 0 2px 8px rgba(79, 172, 254, 0.3);
            }

            .neutral {
                background-color: var(--neutral-bg);
                color: var(--text-muted);
                font-weight: 500;
                border: 1px solid var(--border-color);
            }

            /* Combined table for desktop */
            .combined-table {
                display: block;
            }

            .combined-table table {
                width: 95%;
                max-width: 1400px;
                margin: 20px auto;
            }

            .combined-table th {
                background: var(--gold-gradient);
                color: var(--header-text);
                padding: 12px 8px;
                font-size: 13px;
                font-weight: 700;
            }

            .combined-table td {
                padding: 10px 8px;
                font-size: 13px;
                color: var(--text-primary);
            }

            .combined-table td:first-child {
                text-align: left;
                padding-left: 15px;
                font-weight: 500;
                color: var(--text-secondary);
            }

            .combined-table .signal-box {
                width: 70px;
                padding: 6px 8px;
                font-size: 13px;
            }

            .combined-table tbody tr:hover {
                background-color: var(--table-hover);
                transition: background-color 0.2s ease;
            }

            .combined-table tbody tr {
                border-bottom: 1px solid var(--border-color);
            }

            .mobile-tables {
                display: none;
            }

            @media (max-width: 768px) {
                .combined-table {
                    display: none;
                }
                .mobile-tables {
                    display: block;
                }
                
                .theme-toggle {
                    top: 10px;
                    right: 10px;
                    width: 40px;
                    height: 40px;
                    font-size: 20px;
                }
            }

            @media (max-width: 600px) {
                table {
                    width: 100%;
                }

                th,
                td {
                    padding: 5px;
                    font-size: 14px;
                }

                .signal-box {
                    width: 70px;
                }
            }

            @media (max-width: 460px) {
                body {
                    padding-bottom: 100px;
                }
                h2 {
                    font-size: 20px;
                }

                th,
                td {
                    font-size: 12px;
                }

                .signal-box {
                    width: 60px;
                }
            }

            /* Signal Bot Buttons */
            .signal-buttons {
                display: flex;
                justify-content: center;
                gap: 15px;
                margin: 20px auto;
                max-width: 600px;
            }

            .signal-btn {
                flex: 1;
                padding: 12px 24px;
                font-family: 'Poppins', sans-serif;
                font-size: 15px;
                font-weight: 700;
                border: none;
                border-radius: 50px;
                cursor: pointer;
                transition: all 0.3s ease;
                box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .o-signal-btn {
                background: var(--gold-gradient);
                color: #1a1a1a;
                border: 2px solid var(--gold-primary);
            }

            .o-signal-btn:hover {
                transform: translateY(-2px);
                box-shadow: 
                    0 6px 20px rgba(255, 215, 0, 0.5),
                    0 0 30px rgba(255, 215, 0, 0.3);
            }

            .signal-btn:active {
                transform: translateY(0);
            }

            @media (max-width: 600px) {
                .signal-buttons {
                    flex-direction: column;
                    gap: 10px;
                    padding: 0 15px;
                }

                .signal-btn {
                    padding: 10px 20px;
                    font-size: 14px;
                }
            }
        </style>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
    </head>
    <body>
        <!-- Theme Toggle -->
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">🌙</button>
        
        <h2>Trading Signals Monitor</h2>
        
        <!-- Signal Bot Button -->
        <div class="signal-buttons">
            <button class="signal-btn o-signal-btn" onclick="loadSignalBot()">🤖 Load Signal Bot</button>
        </div>
        
        <!-- Combined Table for Desktop -->
        <div class="combined-table">
            <h2>All Trading Signals</h2>
            <table>
                <thead>
                    <tr>
                        <th>MARKET</th>
                        <th>OVER 2</th>
                        <th>UNDER 7</th>
                    </tr>
                </thead>
                <tbody id="combinedTable"></tbody>
            </table>
        </div>

        <!-- Separate Tables for Mobile -->
        <div class="mobile-tables">
            <h2>Over 2 / Under 7</h2>
            <table>
                <thead>
                    <tr>
                        <th>MARKET</th>
                        <th>Over 2</th>
                        <th>Under 7</th>
                    </tr>
                </thead>
                <tbody id="overUnderTable"></tbody>
            </table>

            
            <table>
                
                <tbody id="riseFallTable"></tbody>
            </table>
        </div>

        <script src="signals/signals.js" type="text/javascript"></script>
        <script>
            // Theme Management
            function initTheme() {
                // Check localStorage first
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme) {
                    setTheme(savedTheme);
                    return;
                }
                
                // Check system preference
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
                    setTheme('light');
                } else {
                    setTheme('dark');
                }
            }

            function setTheme(theme) {
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('theme', theme);
                
                // Update toggle button icon
                const toggle = document.querySelector('.theme-toggle');
                toggle.textContent = theme === 'dark' ? '☀️' : '🌙';
                toggle.title = theme === 'dark' ? 'Switch to Light' : 'Switch to Dark';
            }

            function toggleTheme() {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                setTheme(newTheme);
            }

            // Listen for system theme changes
            if (window.matchMedia) {
                window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', e => {
                    if (!localStorage.getItem('theme')) {
                        setTheme(e.matches ? 'light' : 'dark');
                    }
                });
            }

            // Initialize theme on load
            initTheme();

            // Load Signal Bot into bot builder
            function loadSignalBot() {
                window.parent.postMessage({
                    action: 'load_bot_file',
                    fileName: 'Market Legend v2.xml'
                }, '*');
            }
        </script>
    </body>
</html>
